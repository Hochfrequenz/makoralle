name: "Packaging Test"

on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  check_packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: 3.14
      - name: Build the package
        run: |
          uv build
      - name: Check the package
        run: |
          uv publish --dry-run --trusted-publishing never
